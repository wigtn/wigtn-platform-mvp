{
  "openapi": "3.1.0",
  "info": { "title": "WIGTN Public API", "version": "1.0.0" },
  "paths":
    {
      "/v1/boards":
        {
          "get":
            {
              "operationId": "listBoards",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
        },
      "/v1/boards/{boardSlug}/posts":
        {
          "parameters": [{ "$ref": "#/components/parameters/BoardSlug" }],
          "get":
            {
              "operationId": "listBoardPosts",
              "parameters":
                [
                  { "$ref": "#/components/parameters/Cursor" },
                  {
                    "name": "q",
                    "in": "query",
                    "schema":
                      { "type": "string", "minLength": 3, "maxLength": 100 },
                  },
                ],
              "responses":
                {
                  "200": { "$ref": "#/components/responses/Success" },
                  "429": { "$ref": "#/components/responses/RateLimited" },
                },
            },
          "post":
            {
              "operationId": "createPost",
              "parameters":
                [{ "$ref": "#/components/parameters/IdempotencyKey" }],
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            { "$ref": "#/components/schemas/PostWrite" },
                        },
                    },
                },
              "responses":
                {
                  "201": { "$ref": "#/components/responses/Success" },
                  "403": { "$ref": "#/components/responses/Forbidden" },
                },
            },
        },
      "/v1/posts/{postId}":
        {
          "parameters": [{ "$ref": "#/components/parameters/PostId" }],
          "get":
            {
              "operationId": "getPost",
              "responses":
                {
                  "200": { "$ref": "#/components/responses/Success" },
                  "404": { "$ref": "#/components/responses/NotFound" },
                },
            },
          "patch":
            {
              "operationId": "updatePost",
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            { "$ref": "#/components/schemas/PostWrite" },
                        },
                    },
                },
              "responses":
                {
                  "200": { "$ref": "#/components/responses/Success" },
                  "403": { "$ref": "#/components/responses/Forbidden" },
                },
            },
          "delete":
            {
              "operationId": "deletePost",
              "responses":
                {
                  "200": { "$ref": "#/components/responses/Success" },
                  "403": { "$ref": "#/components/responses/Forbidden" },
                },
            },
        },
      "/v1/posts/{postId}/comments":
        {
          "parameters": [{ "$ref": "#/components/parameters/PostId" }],
          "get":
            {
              "operationId": "listComments",
              "parameters": [{ "$ref": "#/components/parameters/Cursor" }],
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
          "post":
            {
              "operationId": "createComment",
              "parameters":
                [{ "$ref": "#/components/parameters/IdempotencyKey" }],
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            {
                              "type": "object",
                              "required": ["body"],
                              "properties":
                                {
                                  "body":
                                    { "type": "string", "maxLength": 5000 },
                                  "parentId":
                                    {
                                      "type": ["string", "null"],
                                      "format": "uuid",
                                    },
                                },
                            },
                        },
                    },
                },
              "responses":
                {
                  "201": { "$ref": "#/components/responses/Success" },
                  "429": { "$ref": "#/components/responses/RateLimited" },
                },
            },
        },
      "/v1/comments/{commentId}":
        {
          "parameters":
            [
              {
                "name": "commentId",
                "in": "path",
                "required": true,
                "schema": { "type": "string", "format": "uuid" },
              },
            ],
          "patch":
            {
              "operationId": "updateComment",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
          "delete":
            {
              "operationId": "deleteComment",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
        },
      "/v1/posts/{postId}/reactions":
        {
          "parameters": [{ "$ref": "#/components/parameters/PostId" }],
          "post":
            {
              "operationId": "setReaction",
              "responses":
                { "201": { "$ref": "#/components/responses/Success" } },
            },
        },
      "/v1/posts/{postId}/reactions/{type}":
        {
          "parameters":
            [
              { "$ref": "#/components/parameters/PostId" },
              {
                "name": "type",
                "in": "path",
                "required": true,
                "schema": { "const": "like" },
              },
            ],
          "delete":
            {
              "operationId": "removeReaction",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
        },
      "/v1/posts/{postId}/bookmark":
        {
          "parameters": [{ "$ref": "#/components/parameters/PostId" }],
          "put":
            {
              "operationId": "setBookmark",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
          "delete":
            {
              "operationId": "removeBookmark",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
        },
      "/v1/reports":
        {
          "post":
            {
              "operationId": "createReport",
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            { "$ref": "#/components/schemas/ReportWrite" },
                        },
                    },
                },
              "responses":
                {
                  "201": { "$ref": "#/components/responses/Success" },
                  "409": { "description": "Duplicate open report" },
                  "429": { "$ref": "#/components/responses/RateLimited" },
                },
            },
        },
      "/v1/uploads/presign":
        {
          "post":
            {
              "operationId": "presignUpload",
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            { "$ref": "#/components/schemas/UploadWrite" },
                        },
                    },
                },
              "responses":
                {
                  "201": { "$ref": "#/components/responses/Success" },
                  "429": { "$ref": "#/components/responses/RateLimited" },
                },
            },
        },
      "/v1/uploads/{uploadId}/complete":
        {
          "parameters":
            [
              {
                "name": "uploadId",
                "in": "path",
                "required": true,
                "schema": { "type": "string", "format": "uuid" },
              },
            ],
          "post":
            {
              "operationId": "completeUpload",
              "responses":
                { "200": { "$ref": "#/components/responses/Success" } },
            },
        },
    },
  "components":
    {
      "parameters":
        {
          "BoardSlug":
            {
              "name": "boardSlug",
              "in": "path",
              "required": true,
              "schema": { "type": "string" },
            },
          "PostId":
            {
              "name": "postId",
              "in": "path",
              "required": true,
              "schema": { "type": "string", "format": "uuid" },
            },
          "Cursor":
            {
              "name": "cursor",
              "in": "query",
              "required": false,
              "schema": { "type": "string" },
            },
          "IdempotencyKey":
            {
              "name": "Idempotency-Key",
              "in": "header",
              "required": true,
              "schema": { "type": "string", "minLength": 8, "maxLength": 128 },
            },
        },
      "schemas":
        {
          "ContentDocument":
            {
              "type": "object",
              "required": ["version", "blocks"],
              "properties":
                {
                  "version": { "const": 1 },
                  "blocks":
                    {
                      "type": "array",
                      "minItems": 1,
                      "maxItems": 200,
                      "items": { "type": "object" },
                    },
                },
            },
          "PostWrite":
            {
              "type": "object",
              "required": ["title", "content"],
              "properties":
                {
                  "title":
                    { "type": "string", "minLength": 1, "maxLength": 200 },
                  "content": { "$ref": "#/components/schemas/ContentDocument" },
                  "attachmentIds":
                    {
                      "type": "array",
                      "items": { "type": "string", "format": "uuid" },
                    },
                },
            },
          "ReportWrite":
            {
              "type": "object",
              "required": ["reasonCode"],
              "oneOf":
                [{ "required": ["postId"] }, { "required": ["commentId"] }],
              "properties":
                {
                  "postId": { "type": "string", "format": "uuid" },
                  "commentId": { "type": "string", "format": "uuid" },
                  "reasonCode":
                    { "type": "string", "minLength": 2, "maxLength": 50 },
                  "details": { "type": "string", "maxLength": 1000 },
                },
            },
          "UploadWrite":
            {
              "type": "object",
              "required": ["fileName", "mimeType", "sizeBytes"],
              "properties":
                {
                  "fileName": { "type": "string", "maxLength": 255 },
                  "mimeType":
                    {
                      "enum":
                        [
                          "image/jpeg",
                          "image/png",
                          "image/webp",
                          "application/pdf",
                        ],
                    },
                  "sizeBytes":
                    { "type": "integer", "minimum": 1, "maximum": 10485760 },
                },
            },
        },
      "responses":
        {
          "Success":
            {
              "description": "Successful response",
              "content":
                {
                  "application/json":
                    {
                      "schema":
                        {
                          "type": "object",
                          "required": ["data"],
                          "properties": { "data": {} },
                        },
                    },
                },
            },
          "Forbidden": { "description": "Permission denied" },
          "NotFound": { "description": "Resource not found" },
          "RateLimited": { "description": "Application rate limit exceeded" },
        },
    },
}
