{
  "openapi": "3.1.0",
  "info": { "title": "WIGTN Admin Tool API", "version": "1.0.0" },
  "paths":
    {
      "/admin/v1/tools/manifest":
        {
          "get":
            {
              "operationId": "listAdminToolManifest",
              "responses":
                {
                  "200":
                    {
                      "description": "Permission-filtered tool manifest",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "type": "object",
                                  "required": ["schemaVersion", "tools"],
                                  "properties":
                                    {
                                      "schemaVersion": { "const": 1 },
                                      "tools":
                                        {
                                          "type": "array",
                                          "items":
                                            {
                                              "$ref": "#/components/schemas/AdminToolManifest",
                                            },
                                        },
                                    },
                                },
                            },
                        },
                    },
                  "401": { "description": "Authentication required" },
                },
            },
        },
      "/admin/v1/tools/{toolId}/execute":
        {
          "post":
            {
              "operationId": "executeAdminTool",
              "parameters":
                [
                  {
                    "name": "toolId",
                    "in": "path",
                    "required": true,
                    "schema": { "type": "string" },
                  },
                  {
                    "name": "Idempotency-Key",
                    "in": "header",
                    "required": false,
                    "schema": { "type": "string", "minLength": 8 },
                  },
                ],
              "requestBody":
                {
                  "required": true,
                  "content":
                    {
                      "application/json":
                        {
                          "schema":
                            {
                              "type": "object",
                              "required": ["version", "input"],
                              "properties":
                                {
                                  "version":
                                    { "type": "integer", "minimum": 1 },
                                  "input": { "type": "object" },
                                },
                            },
                        },
                    },
                },
              "responses":
                {
                  "200":
                    {
                      "description": "Validated tool result",
                      "content":
                        {
                          "application/json":
                            {
                              "schema":
                                {
                                  "$ref": "#/components/schemas/AdminToolResult",
                                },
                            },
                        },
                    },
                  "400":
                    { "description": "Input or idempotency validation failed" },
                  "403": { "description": "Permission or step-up denied" },
                  "404": { "description": "Tool not found" },
                },
            },
        },
    },
  "components":
    {
      "schemas":
        {
          "AdminToolManifest":
            {
              "type": "object",
              "required":
                [
                  "name",
                  "version",
                  "description",
                  "inputSchema",
                  "outputSchema",
                  "permissions",
                  "risk",
                ],
              "properties":
                {
                  "name": { "type": "string" },
                  "version": { "type": "integer", "minimum": 1 },
                  "description": { "type": "string" },
                  "inputSchema": { "type": "object" },
                  "outputSchema": { "type": "object" },
                  "permissions":
                    { "type": "array", "items": { "type": "string" } },
                  "risk": { "enum": ["low", "medium", "high"] },
                },
            },
          "AdminToolResult":
            {
              "type": "object",
              "required": ["tool", "version", "traceId", "output"],
              "properties":
                {
                  "tool": { "type": "string" },
                  "version": { "type": "integer" },
                  "traceId": { "type": "string" },
                  "output": { "type": "object" },
                },
            },
        },
    },
}
